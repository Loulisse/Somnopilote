<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Somnopilote</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Somnopilote">
<meta name="theme-color" content="#080c10">
<link id="appIcon" rel="apple-touch-icon" href="">
<style>
:root {
  --bg: #080c10;
  --surface: #0d1520;
  --surface2: #111d2e;
  --accent: #00c8ff;
  --accent2: #ff6b35;
  --danger: #ff2d55;
  --text: #e8f4f8;
  --dim: #5a7a8a;
  --border: rgba(0,200,255,0.15);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; position:fixed; width:100%; }
body {
  background:var(--bg); color:var(--text);
  font-family: -apple-system, 'Helvetica Neue', sans-serif;
  display:flex; flex-direction:column;
}
.mono { font-family: 'Courier New', monospace; }

/* background fx */
body::before {
content:’’; position:fixed; inset:0; pointer-events:none; z-index:0;
background:
radial-gradient(ellipse at 25% 15%, rgba(0,80,130,0.2) 0%, transparent 55%),
radial-gradient(ellipse at 75% 85%, rgba(0,40,80,0.15) 0%, transparent 55%);
}

.app { position:relative; z-index:1; display:flex; flex-direction:column; height:100%; width:100%; }

/* ── SETUP ── */
#setupScreen {
flex:1; display:flex; flex-direction:column;
align-items:center; justify-content:center;
padding:20px; gap:24px; overflow-y:auto;
}

.logo {
font-family:‘Courier New’,monospace;
font-size:30px; font-weight:900; letter-spacing:4px;
text-align:center;
}
.logo .s1 { color:var(–accent); }
.logo .s2 { color:var(–accent2); }
.tagline { font-size:10px; letter-spacing:3px; color:var(–dim); text-transform:uppercase; text-align:center; margin-top:4px; }

.card {
background:var(–surface); border:1px solid var(–border);
border-radius:16px; padding:20px; width:100%; max-width:420px;
display:flex; flex-direction:column; gap:16px;
}
.card-title { font-size:10px; letter-spacing:3px; color:var(–accent); text-transform:uppercase; }

.fg { display:flex; flex-direction:column; gap:6px; }
.fg label { font-size:10px; color:var(–dim); letter-spacing:1px; text-transform:uppercase; }
.fg input, .fg select {
background:var(–bg); border:1px solid var(–border);
border-radius:10px; padding:14px;
color:var(–text); font-size:16px; outline:none; width:100%;
-webkit-appearance:none; appearance:none;
font-family:-apple-system,‘Helvetica Neue’,sans-serif;
}
.fg input:focus, .fg select:focus { border-color:var(–accent); }
.fg input::placeholder { color:var(–dim); }
.row2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

.btn-start {
background:var(–accent); color:#000;
font-size:14px; font-weight:700; letter-spacing:2px;
border:none; border-radius:12px; padding:18px;
width:100%; cursor:pointer; text-transform:uppercase;
}
.btn-start:active { opacity:0.8; }

#micWarn {
display:none; background:rgba(255,107,53,0.12);
border:1px solid rgba(255,107,53,0.3); border-radius:10px;
padding:12px; font-size:12px; color:var(–accent2);
text-align:center; line-height:1.6;
}
#micWarn.show { display:block; }

/* ── DRIVE ── */
#driveScreen { flex:1; display:none; flex-direction:column; height:100%; overflow:hidden; }

.sbar {
display:flex; align-items:center; justify-content:space-between;
padding:14px 18px; border-bottom:1px solid var(–border);
background:rgba(8,12,16,0.97); flex-shrink:0;
}
.sname { font-family:‘Courier New’,monospace; font-size:13px; font-weight:700; color:var(–accent); letter-spacing:2px; }
.sind { display:flex; align-items:center; gap:6px; font-size:10px; color:var(–dim); letter-spacing:1px; text-transform:uppercase; }
.dot { width:7px; height:7px; border-radius:50%; }
.dot-w  { background:var(–accent); animation:blink 2s infinite; }
.dot-a  { background:var(–danger); animation:blink 0.4s infinite; }
.dot-sp { background:var(–accent2); animation:blink 0.8s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

.dmain { flex:1; display:flex; flex-direction:column; padding:14px; gap:12px; overflow:hidden; min-height:0; }

/* Timer */
.tring-wrap { display:flex; justify-content:center; flex-shrink:0; }
.tring-box { position:relative; width:110px; height:110px; }
.tring-svg { width:110px; height:110px; transform:rotate(-90deg); }
.tr-bg   { fill:none; stroke:rgba(0,200,255,0.1); stroke-width:5; }
.tr-fill {
fill:none; stroke:var(–accent); stroke-width:5;
stroke-linecap:round; stroke-dasharray:283; stroke-dashoffset:0;
transition:stroke-dashoffset 1s linear;
filter:drop-shadow(0 0 4px rgba(0,200,255,0.8));
}
.tr-fill.urgent { stroke:var(–danger); filter:drop-shadow(0 0 4px rgba(255,45,85,0.8)); }
.tring-center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.tnum { font-family:‘Courier New’,monospace; font-size:24px; font-weight:700; color:var(–accent); }
.tlbl { font-size:8px; color:var(–dim); letter-spacing:2px; text-transform:uppercase; margin-top:2px; }

/* Conversation */
.csec {
flex:1; min-height:0; background:var(–surface);
border:1px solid var(–border); border-radius:14px;
padding:12px; display:flex; flex-direction:column; gap:8px; overflow:hidden;
}
.clbl { font-size:9px; color:var(–dim); letter-spacing:2px; text-transform:uppercase; flex-shrink:0; }
.cscroll { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:8px; min-height:0; }
.cscroll::-webkit-scrollbar { display:none; }

.bbl { max-width:90%; padding:10px 13px; border-radius:12px; font-size:14px; line-height:1.5; }
.bbl-sp {
background:var(–surface2); border:1px solid var(–border);
border-bottom-left-radius:3px; align-self:flex-start;
}
.bbl-sp .bn { font-size:9px; color:var(–accent); letter-spacing:1px; text-transform:uppercase; margin-bottom:3px; font-family:‘Courier New’,monospace; }
.bbl-us {
background:rgba(0,200,255,0.08); border:1px solid rgba(0,200,255,0.15);
border-bottom-right-radius:3px; align-self:flex-end;
}
.bbl-us .bn { font-size:9px; color:var(–accent); letter-spacing:1px; text-transform:uppercase; margin-bottom:3px; font-family:‘Courier New’,monospace; }

.spbar {
display:none; align-items:center; gap:8px; padding:6px 10px;
background:rgba(255,107,53,0.08); border:1px solid rgba(255,107,53,0.15);
border-radius:20px; font-size:11px; color:var(–accent2); flex-shrink:0;
}
.spbar.on { display:flex; }
.wf { display:flex; align-items:center; gap:2px; height:16px; }
.wb { width:3px; border-radius:2px; background:var(–accent2); animation:wav 0.7s ease-in-out infinite; }
.wb:nth-child(1){height:5px;animation-delay:0s}
.wb:nth-child(2){height:10px;animation-delay:.1s}
.wb:nth-child(3){height:16px;animation-delay:.2s}
.wb:nth-child(4){height:10px;animation-delay:.3s}
.wb:nth-child(5){height:5px;animation-delay:.4s}
@keyframes wav { 0%,100%{transform:scaleY(0.3)} 50%{transform:scaleY(1)} }

/* Mic button */
.lsec { display:flex; flex-direction:column; align-items:center; gap:8px; flex-shrink:0; }
.lbtn {
width:64px; height:64px; border-radius:50%;
background:rgba(0,200,255,0.08); border:2px solid var(–accent);
display:flex; align-items:center; justify-content:center;
font-size:28px; cursor:pointer;
}
.lbtn.on { background:rgba(0,200,255,0.25); box-shadow:0 0 0 8px rgba(0,200,255,0.15); }
.lbtn.proc { border-color:var(–accent2); }
.lbtn:active { opacity:0.7; }
.lstatus { font-size:10px; color:var(–dim); letter-spacing:1px; text-transform:uppercase; }

/* Bottom */
.bctrl { padding:8px 14px 20px; display:grid; grid-template-columns:1fr 1fr; gap:10px; flex-shrink:0; }
.btn-now {
background:transparent; color:var(–accent);
font-size:11px; font-weight:700; letter-spacing:1px;
border:1px solid var(–border); border-radius:10px; padding:14px;
cursor:pointer; text-transform:uppercase;
}
.btn-stop {
background:var(–danger); color:#fff;
font-size:11px; font-weight:700; letter-spacing:1px;
border:none; border-radius:10px; padding:14px;
cursor:pointer; text-transform:uppercase;
}
.btn-now:active, .btn-stop:active { opacity:0.7; }

/* Thinking */
.thinking { display:flex; gap:5px; align-items:center; padding:10px 13px; align-self:flex-start; }
.td { width:6px; height:6px; border-radius:50%; background:var(–dim); animation:th 1.1s ease-in-out infinite; }
.td:nth-child(2){animation-delay:.2s} .td:nth-child(3){animation-delay:.4s}
@keyframes th { 0%,100%{opacity:0.2;transform:scale(0.8)} 50%{opacity:1;transform:scale(1.3)} }

/* Alert */
#alertBox {
display:none; position:fixed; inset:0; z-index:200;
background:rgba(255,45,85,0.1); align-items:center; justify-content:center;
}
#alertBox.on { display:flex; }
.ainner {
background:var(–surface); border:2px solid var(–danger);
border-radius:18px; padding:28px 22px; text-align:center; max-width:280px;
}
.aemoji { font-size:44px; margin-bottom:8px; }
.atitle { font-family:‘Courier New’,monospace; font-size:16px; color:var(–danger); letter-spacing:2px; margin-bottom:6px; }
.atext { font-size:13px; color:var(–dim); margin-bottom:16px; line-height:1.5; }
.btn-awake {
background:var(–accent); color:#000;
font-size:12px; font-weight:700; letter-spacing:1px;
border:none; border-radius:10px; padding:14px 20px;
cursor:pointer; text-transform:uppercase; width:100%;
}
</style>

</head>

<script>
// ── Icône PWA ──
(function(){
  try {
    var c = document.createElement('canvas');
    c.width = c.height = 180;
    var x = c.getContext('2d');
    x.fillStyle = '#080c10'; x.fillRect(0,0,180,180);
    x.strokeStyle = '#00c8ff'; x.lineWidth = 8;
    x.beginPath(); x.arc(90,90,74,0,Math.PI*2); x.stroke();
    x.strokeStyle = '#ff6b35'; x.lineWidth = 4;
    x.beginPath(); x.arc(90,90,56,-Math.PI/2,Math.PI,false); x.stroke();
    x.fillStyle = '#00c8ff';
    x.font = 'bold 70px Courier New';
    x.textAlign = 'center'; x.textBaseline = 'middle';
    x.fillText('S', 90, 90);
    document.getElementById('appIcon').href = c.toDataURL('image/png');
  } catch(e) {}
})();

// ── State ──
var S = {
  apiKey:'', userName:'toi', style:'varied',
  iMs: 7*60000, vMs: 2*60000,
  nextAt:0, totSecs:0,
  mt:null, ct:null, nrt:null,
  listening:false, speaking:false, processing:false,
  rec:null, synth:window.speechSynthesis,
  hist:[], topics:[], micOk:false
};

// ── Bind buttons (évite les problèmes onclick sur iOS) ──
window.addEventListener('DOMContentLoaded', function() {
  document.getElementById('btnStart').addEventListener('click', startDriving);
  document.getElementById('btnNow').addEventListener('click', askNow);
  document.getElementById('btnStop').addEventListener('click', stopDriving);
  document.getElementById('lbtn').addEventListener('click', toggleListen);
  document.getElementById('btnAwake').addEventListener('click', dismissAlert);
});

function startDriving() {
  var name = document.getElementById('uname').value.trim();
  var key  = document.getElementById('akey').value.trim();
  if (!name) { alert('Entre ton prénom !'); return; }
  if (!key.startsWith('gsk_')) { alert('Clé Groq invalide — elle commence par gsk_'); return; }

  S.apiKey   = key;
  S.userName = name;
  S.iMs  = parseInt(document.getElementById('imin').value) * 60000;
  S.vMs  = parseInt(document.getElementById('ivar').value) * 60000;
  S.style= document.getElementById('style').value;

  document.getElementById('sname').textContent = 'SOMNOPILOTE · ' + name.toUpperCase();
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('driveScreen').style.display = 'flex';

  wakeLock();
  initMic();
}

function stopDriving() {
  if (!confirm('Arrêter Somnopilote ?')) return;
  clearAll();
  S.synth.cancel();
  if (S.rec) { try { S.rec.stop(); } catch(e){} }
  document.getElementById('driveScreen').style.display = 'none';
  document.getElementById('setupScreen').style.display = 'flex';
  document.getElementById('cscroll').innerHTML = '';
  S.hist = []; S.topics = [];
}

function wakeLock() {
  if ('wakeLock' in navigator) {
    navigator.wakeLock.request('screen').catch(function(){});
  }
}

function initMic() {
  navigator.mediaDevices.getUserMedia({ audio: true })
    .then(function(stream) {
      stream.getTracks().forEach(function(t){ t.stop(); });
      S.micOk = true;
      setupRec();
      greet();
    })
    .catch(function(err) {
      console.warn('Mic denied:', err);
      document.getElementById('micWarn').classList.add('show');
      greet();
    });
}

function setupRec() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    addMsg('sp', '⚠️ Reconnaissance vocale non dispo. Utilise Safari sur iPhone.');
    return;
  }
  S.rec = new SR();
  S.rec.lang = 'fr-FR';
  S.rec.continuous = false;
  S.rec.interimResults = false;

  S.rec.onresult = function(e) {
    var t = e.results[0][0].transcript;
    stopListen();
    handleSpeech(t);
  };
  S.rec.onerror = function(e) {
    stopListen();
    if (e.error === 'not-allowed') {
      addMsg('sp', 'Micro refusé. Va dans Réglages → Safari → Micro et autorise.');
    }
  };
  S.rec.onend = function() {
    if (S.listening) stopListen();
  };
}

function toggleListen() {
  if (S.speaking || S.processing) return;
  if (S.listening) stopListen(); else startListen();
}

function startListen() {
  if (!S.rec) { setupRec(); if (!S.rec) return; }
  S.listening = true;
  clearNRT();
  document.getElementById('lbtn').classList.add('on');
  document.getElementById('lstatus').textContent = 'Je t\'écoute…';
  setStatus('w', 'ÉCOUTE');
  try { S.rec.start(); } catch(e) { console.warn(e); }
}

function stopListen() {
  S.listening = false;
  document.getElementById('lbtn').classList.remove('on');
  document.getElementById('lstatus').textContent = 'Appuyer pour répondre';
  try { S.rec.stop(); } catch(e) {}
}

function speak(text, cb) {
  S.synth.cancel();
  var u = new SpeechSynthesisUtterance(text);
  u.lang = 'fr-FR'; u.rate = 0.92; u.pitch = 1.0; u.volume = 1.0;

  var voices = S.synth.getVoices();
  var fr = null;
  for (var i=0; i<voices.length; i++) {
    if (voices[i].lang === 'fr-FR') { fr = voices[i]; break; }
  }
  if (fr) u.voice = fr;

  S.speaking = true;
  document.getElementById('spbar').classList.add('on');
  setStatus('sp', 'PARLE');

  u.onend = function() { onSpeakEnd(cb); };
  u.onerror = function() { onSpeakEnd(cb); };
  S.synth.speak(u);

  // Fix bug Safari : synthèse qui se met en pause
  var fix = setInterval(function() {
    if (!S.speaking) { clearInterval(fix); return; }
    if (S.synth.paused) S.synth.resume();
  }, 1500);
}

function onSpeakEnd(cb) {
  S.speaking = false;
  document.getElementById('spbar').classList.remove('on');
  setStatus('w', 'EN ROUTE');
  if (cb) cb();
}

function schedule() {
  clearAll();
  var jitter = (Math.random()*2 - 1) * S.vMs;
  var delay  = Math.max(60000, S.iMs + jitter);
  S.totSecs  = Math.floor(delay / 1000);
  S.nextAt   = Date.now() + delay;
  S.mt = setTimeout(interpellate, delay);
  startCD();
}

function startCD() {
  if (S.ct) clearInterval(S.ct);
  var C = 2 * Math.PI * 45;
  var ring = document.getElementById('tring');
  ring.style.strokeDasharray = C;

  function tick() {
    var rem = Math.max(0, Math.floor((S.nextAt - Date.now()) / 1000));
    var m = Math.floor(rem/60), s = rem % 60;
    document.getElementById('tnum').textContent =
      m > 0 ? (m + ':' + (s < 10 ? '0'+s : s)) : (rem + 's');
    ring.style.strokeDashoffset = C * (1 - rem / S.totSecs);
    if (rem <= 30) ring.classList.add('urgent');
    else ring.classList.remove('urgent');
  }
  tick();
  S.ct = setInterval(tick, 1000);
}

function clearAll() { clearTimeout(S.mt); clearInterval(S.ct); clearNRT(); }

function startNRT() {
  S.nrt = setTimeout(function() {
    document.getElementById('alertBox').classList.add('on');
    speak(S.userName + ' ! ' + S.userName + ' ! Tu m\'entends ? Réponds-moi !');
  }, 28000);
}
function clearNRT() { clearTimeout(S.nrt); dismissAlert(); }
function dismissAlert() { document.getElementById('alertBox').classList.remove('on'); }

function greet() {
  callGroq(
    'Tu t\'appelles Somnopilote. Tu es le copilote anti-somnolence de ' + S.userName +
    ' qui souffre d\'hypersomnie au volant. Génère un message de bienvenue chaleureux en 2-3 phrases, en français, en la tutoyant. ' +
    'Dis-lui que tu vas l\'interpeller régulièrement pour la maintenir éveillée.',
    [],
    function(text) {
      addMsg('sp', text);
      speak(text, function() { schedule(); });
    }
  );
}

function interpellate() {
  setStatus('a', 'INTERPELLATION');
  var done = S.topics.slice(-25).join(', ');
  callGroq(
    'Interpelle ' + S.userName + ' pour la maintenir éveillée au volant. ' +
    'SUJETS DÉJÀ TRAITÉS (ne pas répéter): ' + (done || 'aucun') + '. ' +
    'Lance une interpellation originale: fait insolite, question philosophique, débat, devinette, quiz, anecdote. ' +
    'Style: ' + styleLabel() + '. ' +
    'Commence par son prénom. Pose UNE question précise à la fin. 2-3 phrases max. Naturel et engageant.',
    S.hist,
    function(text) {
      var kw = '';
      var words = text.split(' ');
      for (var i=0; i<words.length; i++) { if (words[i].length > 5) { kw = words[i]; break; } }
      S.topics.push(kw || text.substring(0,30));
      addMsg('sp', text);
      speak(text, function() {
        startNRT();
        setTimeout(startListen, 600);
      });
      schedule();
    }
  );
}

function askNow() { clearAll(); interpellate(); }

function handleSpeech(transcript) {
  clearNRT();
  addMsg('us', transcript);
  setStatus('w', 'TRAITEMENT');
  S.processing = true;
  document.getElementById('lbtn').classList.add('proc');
  document.getElementById('lstatus').textContent = 'Réflexion…';
  var th = addThinking();
  S.hist.push({ role:'user', content:transcript });

  callGroq(
    S.userName + ' vient de répondre: "' + transcript + '". ' +
    'Réponds naturellement en 2-3 phrases. Rebondis sur sa réponse ou conclus en disant que tu reviendras bientôt.',
    S.hist,
    function(reply) {
      th.remove();
      S.hist.push({ role:'assistant', content:reply });
      if (S.hist.length > 10) S.hist = S.hist.slice(-8);
      S.processing = false;
      document.getElementById('lbtn').classList.remove('proc');
      document.getElementById('lstatus').textContent = 'Appuyer pour répondre';
      addMsg('sp', reply);
      speak(reply, function() { setStatus('w', 'EN ROUTE'); });
    }
  );
}

function callGroq(userMsg, hist, cb) {
  var sys = 'Tu es Somnopilote, copilote de ' + S.userName +
    ' contre l\'hypersomnie au volant. Français, tutoiement, chaleureux. ' +
    'Réponses très courtes (2 phrases max). Sujets toujours variés, jamais répétés.';

  var messages = [{ role:'system', content:sys }];
  for (var i=0; i<hist.length; i++) messages.push(hist[i]);
  messages.push({ role:'user', content:userMsg });

  fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + S.apiKey,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      model: 'llama-3.1-8b-instant',
      max_tokens: 150,
      temperature: 0.92,
      messages: messages
    })
  })
  .then(function(res) {
    if (!res.ok) { return res.text().then(function(t){ throw new Error(t); }); }
    return res.json();
  })
  .then(function(data) {
    cb(data.choices[0].message.content.trim());
  })
  .catch(function(err) {
    console.error('Groq error:', err);
    cb('Petit souci de connexion, je suis toujours là !');
  });
}

function addMsg(role, text) {
  var el = document.createElement('div');
  el.className = 'bbl ' + (role === 'sp' ? 'bbl-sp' : 'bbl-us');
  var name = role === 'sp' ? 'Somnopilote' : 'Toi';
  el.innerHTML = '<div class="bn">' + name + '</div>' + esc(text);
  var s = document.getElementById('cscroll');
  s.appendChild(el);
  s.scrollTop = s.scrollHeight;
  return el;
}

function addThinking() {
  var el = document.createElement('div');
  el.className = 'thinking';
  el.innerHTML = '<div class="td"></div><div class="td"></div><div class="td"></div>';
  var s = document.getElementById('cscroll');
  s.appendChild(el);
  s.scrollTop = s.scrollHeight;
  return el;
}

function setStatus(type, text) {
  var d = document.getElementById('sdot');
  document.getElementById('stxt').textContent = text;
  d.className = 'dot ' + (type === 'a' ? 'dot-a' : type === 'sp' ? 'dot-sp' : 'dot-w');
}

function styleLabel() {
  var labels = { varied:'très varié et surprenant', quiz:'quiz et devinettes', philo:'philosophie et débats', culture:'culture générale', science:'science et technologie' };
  return labels[S.style] || 'varié';
}

function esc(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
