<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SOMNOPILOTE</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    --surface: #0d1520;
    --surface2: #111d2e;
    --accent: #00c8ff;
    --accent2: #ff6b35;
    --danger: #ff2d55;
    --success: #30d158;
    --text: #e8f4f8;
    --text-dim: #5a7a8a;
    --border: rgba(0,200,255,0.15);
    --glow: 0 0 20px rgba(0,200,255,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* Ambient background */
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(0,80,120,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(0,40,80,0.1) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* Grid lines background */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(0,200,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,200,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    padding: 0;
  }

  /* ─── SETUP SCREEN ─── */
  #setupScreen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    gap: 32px;
  }

  .logo-block {
    text-align: center;
  }

  .logo {
    font-family: 'Orbitron', monospace;
    font-size: 56px;
    font-weight: 900;
    letter-spacing: 12px;
    color: var(--accent);
    text-shadow: 0 0 40px rgba(0,200,255,0.6), 0 0 80px rgba(0,200,255,0.2);
    animation: pulse-logo 3s ease-in-out infinite;
  }

  @keyframes pulse-logo {
    0%, 100% { text-shadow: 0 0 40px rgba(0,200,255,0.6), 0 0 80px rgba(0,200,255,0.2); }
    50% { text-shadow: 0 0 60px rgba(0,200,255,0.9), 0 0 100px rgba(0,200,255,0.4); }
  }

  .tagline {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-top: 8px;
  }

  .setup-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .setup-card h2 {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
  }

  .field-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .field-group label {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .field-group input, .field-group select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    outline: none;
    width: 100%;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  .field-group input:focus, .field-group select:focus {
    border-color: var(--accent);
    box-shadow: var(--glow);
  }

  .field-group input::placeholder { color: var(--text-dim); }

  .field-group select option { background: #0d1520; }

  .interval-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  /* ─── BUTTONS ─── */
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #0090cc);
    color: #000;
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    border: none;
    border-radius: 12px;
    padding: 18px;
    width: 100%;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(0,200,255,0.3);
  }

  .btn-primary:active { transform: scale(0.97); opacity: 0.9; }

  .btn-danger {
    background: linear-gradient(135deg, var(--danger), #cc0030);
    color: #fff;
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    border: none;
    border-radius: 10px;
    padding: 14px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }

  .btn-secondary {
    background: transparent;
    color: var(--accent);
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }

  /* ─── DRIVE SCREEN ─── */
  #driveScreen {
    flex: 1;
    display: none;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
  }

  /* Status bar */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(13,21,32,0.9);
    backdrop-filter: blur(10px);
  }

  .status-name {
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
  }

  .status-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--success);
    animation: blink 1.5s ease-in-out infinite;
  }

  .dot.waiting { background: var(--accent); animation: blink 2s ease-in-out infinite; }
  .dot.alert { background: var(--danger); animation: blink 0.5s ease-in-out infinite; }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Main area */
  .drive-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 20px;
    gap: 16px;
    overflow: hidden;
  }

  /* Timer ring */
  .timer-section {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 8px 0;
  }

  .timer-ring-container {
    position: relative;
    width: 130px;
    height: 130px;
  }

  .timer-ring-svg {
    width: 130px;
    height: 130px;
    transform: rotate(-90deg);
  }

  .timer-ring-bg {
    fill: none;
    stroke: rgba(0,200,255,0.1);
    stroke-width: 4;
  }

  .timer-ring-fill {
    fill: none;
    stroke: var(--accent);
    stroke-width: 4;
    stroke-linecap: round;
    stroke-dasharray: 339.3;
    stroke-dashoffset: 0;
    transition: stroke-dashoffset 1s linear, stroke 0.3s;
    filter: drop-shadow(0 0 6px rgba(0,200,255,0.8));
  }

  .timer-ring-fill.urgent {
    stroke: var(--danger);
    filter: drop-shadow(0 0 6px rgba(255,45,85,0.8));
  }

  .timer-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .timer-number {
    font-family: 'Orbitron', monospace;
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }

  .timer-label {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* Conversation bubble */
  .convo-section {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    overflow: hidden;
    min-height: 0;
  }

  .convo-label {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .convo-scroll {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scrollbar-width: none;
    min-height: 0;
  }

  .convo-scroll::-webkit-scrollbar { display: none; }

  .bubble {
    max-width: 88%;
    padding: 12px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.5;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .bubble.vigil {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
    align-self: flex-start;
  }

  .bubble.vigil .bubble-name {
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 4px;
    font-family: 'Orbitron', monospace;
  }

  .bubble.user {
    background: linear-gradient(135deg, rgba(0,200,255,0.15), rgba(0,144,204,0.1));
    border: 1px solid rgba(0,200,255,0.25);
    border-bottom-right-radius: 4px;
    color: var(--text);
    align-self: flex-end;
  }

  /* Listening indicator */
  .listen-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .listen-btn {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(0,200,255,0.2), rgba(0,100,150,0.2));
    border: 2px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 0 20px rgba(0,200,255,0.2);
  }

  .listen-btn.active {
    background: linear-gradient(135deg, rgba(0,200,255,0.4), rgba(0,100,150,0.3));
    box-shadow: 0 0 30px rgba(0,200,255,0.5);
    animation: pulse-ring 1s ease-in-out infinite;
  }

  .listen-btn.processing {
    border-color: var(--accent2);
    box-shadow: 0 0 20px rgba(255,107,53,0.4);
  }

  @keyframes pulse-ring {
    0%, 100% { box-shadow: 0 0 30px rgba(0,200,255,0.5), 0 0 0 0 rgba(0,200,255,0.3); }
    50% { box-shadow: 0 0 30px rgba(0,200,255,0.5), 0 0 0 12px rgba(0,200,255,0); }
  }

  .mic-icon { font-size: 24px; }

  .listen-status {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    text-align: center;
  }

  /* Bottom controls */
  .bottom-controls {
    padding: 12px 20px 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  /* Waveform animation */
  .waveform {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 24px;
  }

  .wave-bar {
    width: 3px;
    border-radius: 2px;
    background: var(--accent);
    animation: wave 0.8s ease-in-out infinite;
  }

  .wave-bar:nth-child(1) { animation-delay: 0s; height: 8px; }
  .wave-bar:nth-child(2) { animation-delay: 0.1s; height: 16px; }
  .wave-bar:nth-child(3) { animation-delay: 0.2s; height: 24px; }
  .wave-bar:nth-child(4) { animation-delay: 0.3s; height: 16px; }
  .wave-bar:nth-child(5) { animation-delay: 0.4s; height: 8px; }

  @keyframes wave {
    0%, 100% { transform: scaleY(0.4); }
    50% { transform: scaleY(1); }
  }

  /* Speaking overlay */
  .speaking-indicator {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    background: rgba(0,200,255,0.1);
    border: 1px solid rgba(0,200,255,0.2);
    border-radius: 20px;
    font-size: 12px;
    color: var(--accent);
  }

  .speaking-indicator.active { display: flex; }

  /* Thinking dots */
  .thinking {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 12px 14px;
    align-self: flex-start;
  }

  .thinking-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
    animation: thinking 1.2s ease-in-out infinite;
  }

  .thinking-dot:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes thinking {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.2); }
  }

  /* Alert overlay */
  #alertOverlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(255,45,85,0.15);
    z-index: 100;
    align-items: center;
    justify-content: center;
    animation: alert-pulse 0.5s ease-in-out infinite;
  }

  #alertOverlay.active { display: flex; }

  @keyframes alert-pulse {
    0%, 100% { background: rgba(255,45,85,0.15); }
    50% { background: rgba(255,45,85,0.3); }
  }

  .alert-box {
    background: var(--surface);
    border: 2px solid var(--danger);
    border-radius: 20px;
    padding: 32px 24px;
    text-align: center;
    max-width: 300px;
    box-shadow: 0 0 60px rgba(255,45,85,0.4);
  }

  .alert-emoji { font-size: 48px; margin-bottom: 12px; }

  .alert-title {
    font-family: 'Orbitron', monospace;
    font-size: 18px;
    color: var(--danger);
    letter-spacing: 2px;
    margin-bottom: 8px;
  }

  .alert-text {
    font-size: 14px;
    color: var(--text-dim);
    margin-bottom: 20px;
    line-height: 1.5;
  }

  /* Utility */
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="app">

  <!-- ═══ SETUP SCREEN ═══ -->
  <div id="setupScreen">
    <div class="logo-block">
      <div class="logo" style="font-size:36px; letter-spacing:6px;">SOMNO<span style="color:#ff6b35;">PILOTE</span></div>
      <div class="tagline">Ton copilote anti-somnolence</div>
    </div>

    <div class="setup-card">
      <h2>Configuration</h2>

      <div class="field-group">
        <label>Ton prénom</label>
        <input type="text" id="userName" placeholder="Ex: Sophie" maxlength="20">
      </div>

      <div class="field-group">
        <label>Clé API Groq</label>
        <input type="password" id="apiKey" placeholder="gsk_...">
      </div>

      <div class="field-group">
        <label>Interpellation toutes les</label>
        <div class="interval-row">
          <select id="intervalMin">
            <option value="5">5 min</option>
            <option value="7" selected>7 min</option>
            <option value="10">10 min</option>
            <option value="12">12 min</option>
          </select>
          <select id="intervalVariance">
            <option value="0">Fixe</option>
            <option value="2" selected>± 2 min</option>
            <option value="3">± 3 min</option>
          </select>
        </div>
      </div>

      <div class="field-group">
        <label>Style de conversation</label>
        <select id="convoStyle">
          <option value="varied">Varié (recommandé)</option>
          <option value="quiz">Quiz & devinettes</option>
          <option value="philo">Philosophie & débats</option>
          <option value="culture">Culture générale</option>
          <option value="science">Science & tech</option>
        </select>
      </div>

      <button class="btn-primary" onclick="startDriving()">🚗 &nbsp; DÉMARRER</button>
    </div>
  </div>

  <!-- ═══ DRIVE SCREEN ═══ -->
  <div id="driveScreen">
    <div class="status-bar">
      <div class="status-name" id="statusName">SOMNOPILOTE</div>
      <div class="status-indicator">
        <div class="dot waiting" id="statusDot"></div>
        <span id="statusText">EN ROUTE</span>
      </div>
    </div>

    <div class="drive-main">

      <!-- Timer ring -->
      <div class="timer-section">
        <div class="timer-ring-container">
          <svg class="timer-ring-svg" viewBox="0 0 120 120">
            <circle class="timer-ring-bg" cx="60" cy="60" r="54"/>
            <circle class="timer-ring-fill" id="timerRing" cx="60" cy="60" r="54"/>
          </svg>
          <div class="timer-center">
            <div class="timer-number" id="timerDisplay">--</div>
            <div class="timer-label">Prochain</div>
          </div>
        </div>
      </div>

      <!-- Conversation -->
      <div class="convo-section">
        <div class="convo-label">Conversation</div>
        <div class="convo-scroll" id="convoScroll">
          <!-- messages appear here -->
        </div>
        <div class="speaking-indicator" id="speakingIndicator">
          <div class="waveform">
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
          </div>
          <span>Somnopilote parle…</span>
        </div>
      </div>

      <!-- Mic button -->
      <div class="listen-section">
        <div class="listen-btn" id="listenBtn" onclick="toggleListening()">
          <span class="mic-icon">🎙️</span>
        </div>
        <div class="listen-status" id="listenStatus">Appuyer pour répondre</div>
      </div>

    </div>

    <div class="bottom-controls">
      <button class="btn-secondary" onclick="askNow()">⚡ Interpelle-moi</button>
      <button class="btn-danger" onclick="stopDriving()">■ Arrêter</button>
    </div>
  </div>

  <!-- Alert overlay -->
  <div id="alertOverlay">
    <div class="alert-box">
      <div class="alert-emoji">⚠️</div>
      <div class="alert-title">RÉVEIL !</div>
      <div class="alert-text" id="alertText">Tu n'as pas répondu.<br>Réponds oralement ou touche l'écran.</div>
      <button class="btn-primary" onclick="dismissAlert()" style="font-size:11px; padding:14px;">
        JE SUIS RÉVEILLÉ(E)
      </button>
    </div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let state = {
  apiKey: '',
  userName: 'toi',
  intervalMs: 7 * 60 * 1000,
  intervalVarianceMs: 2 * 60 * 1000,
  convoStyle: 'varied',
  nextInterpellationAt: null,
  timerInterval: null,
  countdownInterval: null,
  isListening: false,
  isSpeaking: false,
  isProcessing: false,
  recognition: null,
  synth: window.speechSynthesis,
  usedTopics: [],
  conversationHistory: [],
  noResponseTimer: null,
  awaitingResponse: false,
  totalRingSeconds: 0,
};

// ═══════════════════════════════════════════════════
// SETUP
// ═══════════════════════════════════════════════════
function startDriving() {
  const name = document.getElementById('userName').value.trim();
  const key = document.getElementById('apiKey').value.trim();
  const intervalMin = parseInt(document.getElementById('intervalMin').value);
  const variance = parseInt(document.getElementById('intervalVariance').value);
  const style = document.getElementById('convoStyle').value;

  if (!key || !key.startsWith('gsk_')) {
    alert('Clé API Groq invalide. Elle doit commencer par gsk_');
    return;
  }
  if (!name) {
    alert('Entre ton prénom s\'il te plaît !');
    return;
  }

  state.apiKey = key;
  state.userName = name;
  state.intervalMs = intervalMin * 60 * 1000;
  state.intervalVarianceMs = variance * 60 * 1000;
  state.convoStyle = style;

  document.getElementById('statusName').textContent = `SOMNOPILOTE · ${name.toUpperCase()}`;
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('driveScreen').style.display = 'flex';

  // Keep screen awake if possible
  requestWakeLock();
  setupSpeechRecognition();
  scheduleNextInterpellation();
  greetUser();
}

function stopDriving() {
  if (confirm('Arrêter Somnopilote ?')) {
    clearAllTimers();
    if (state.recognition) state.recognition.stop();
    state.synth.cancel();
    document.getElementById('driveScreen').style.display = 'none';
    document.getElementById('setupScreen').style.display = 'flex';
    document.getElementById('convoScroll').innerHTML = '';
    state.conversationHistory = [];
    state.usedTopics = [];
  }
}

// ═══════════════════════════════════════════════════
// WAKE LOCK
// ═══════════════════════════════════════════════════
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      await navigator.wakeLock.request('screen');
    }
  } catch(e) { /* not critical */ }
}

// ═══════════════════════════════════════════════════
// SPEECH RECOGNITION
// ═══════════════════════════════════════════════════
function setupSpeechRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    addMessage('vigil', 'La reconnaissance vocale n\'est pas disponible sur ce navigateur. Utilise Safari sur iPhone.');
    return;
  }

  state.recognition = new SpeechRecognition();
  state.recognition.lang = 'fr-FR';
  state.recognition.continuous = false;
  state.recognition.interimResults = false;
  state.recognition.maxAlternatives = 1;

  state.recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;
    stopListening();
    handleUserSpeech(transcript);
  };

  state.recognition.onerror = (event) => {
    stopListening();
    if (event.error !== 'no-speech') {
      document.getElementById('listenStatus').textContent = 'Erreur micro — réessaie';
    }
  };

  state.recognition.onend = () => {
    if (state.isListening) stopListening();
  };
}

function toggleListening() {
  if (state.isSpeaking || state.isProcessing) return;
  if (state.isListening) {
    stopListening();
  } else {
    startListening();
  }
}

function startListening() {
  if (!state.recognition) return;
  state.isListening = true;
  clearNoResponseTimer();
  document.getElementById('listenBtn').classList.add('active');
  document.getElementById('listenStatus').textContent = 'Je t\'écoute…';
  try { state.recognition.start(); } catch(e) {}
}

function stopListening() {
  state.isListening = false;
  document.getElementById('listenBtn').classList.remove('active');
  document.getElementById('listenStatus').textContent = 'Appuyer pour répondre';
  try { state.recognition.stop(); } catch(e) {}
}

// ═══════════════════════════════════════════════════
// SPEECH SYNTHESIS
// ═══════════════════════════════════════════════════
function speak(text, onEnd) {
  state.synth.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'fr-FR';
  utterance.rate = 0.95;
  utterance.pitch = 1.0;
  utterance.volume = 1.0;

  // Try to pick a good French voice
  const voices = state.synth.getVoices();
  const frVoice = voices.find(v => v.lang.startsWith('fr') && v.name.includes('Amélie'))
    || voices.find(v => v.lang.startsWith('fr') && !v.name.includes('Google'))
    || voices.find(v => v.lang.startsWith('fr'));
  if (frVoice) utterance.voice = frVoice;

  state.isSpeaking = true;
  document.getElementById('speakingIndicator').classList.add('active');
  setStatus('speaking', 'SOMNOPILOTE PARLE');

  utterance.onend = () => {
    state.isSpeaking = false;
    document.getElementById('speakingIndicator').classList.remove('active');
    setStatus('waiting', 'EN ROUTE');
    if (onEnd) onEnd();
  };

  utterance.onerror = () => {
    state.isSpeaking = false;
    document.getElementById('speakingIndicator').classList.remove('active');
    if (onEnd) onEnd();
  };

  state.synth.speak(utterance);
}

// ═══════════════════════════════════════════════════
// TIMER & SCHEDULING
// ═══════════════════════════════════════════════════
function scheduleNextInterpellation() {
  clearAllTimers();

  const variance = (Math.random() * 2 - 1) * state.intervalVarianceMs;
  const delay = Math.max(60000, state.intervalMs + variance);
  state.totalRingSeconds = Math.floor(delay / 1000);
  state.nextInterpellationAt = Date.now() + delay;

  state.timerInterval = setTimeout(() => {
    interpellate();
  }, delay);

  startCountdown(state.totalRingSeconds);
}

function startCountdown(totalSeconds) {
  if (state.countdownInterval) clearInterval(state.countdownInterval);

  const ring = document.getElementById('timerRing');
  const circumference = 339.3;

  const tick = () => {
    const remaining = Math.max(0, Math.floor((state.nextInterpellationAt - Date.now()) / 1000));
    const mins = Math.floor(remaining / 60);
    const secs = remaining % 60;
    document.getElementById('timerDisplay').textContent =
      mins > 0 ? `${mins}:${secs.toString().padStart(2,'0')}` : `${remaining}s`;

    const progress = remaining / totalSeconds;
    ring.style.strokeDashoffset = circumference * (1 - progress);

    if (remaining <= 30) {
      ring.classList.add('urgent');
    } else {
      ring.classList.remove('urgent');
    }
  };

  tick();
  state.countdownInterval = setInterval(tick, 1000);
}

function clearAllTimers() {
  if (state.timerInterval) clearTimeout(state.timerInterval);
  if (state.countdownInterval) clearInterval(state.countdownInterval);
  clearNoResponseTimer();
}

// ═══════════════════════════════════════════════════
// NO RESPONSE ALERT
// ═══════════════════════════════════════════════════
function startNoResponseTimer() {
  state.noResponseTimer = setTimeout(() => {
    triggerAlert();
  }, 30000); // 30s sans réponse
}

function clearNoResponseTimer() {
  if (state.noResponseTimer) clearTimeout(state.noResponseTimer);
  state.awaitingResponse = false;
  dismissAlert();
}

function triggerAlert() {
  document.getElementById('alertOverlay').classList.add('active');
  speak(`${state.userName} ! ${state.userName} ! Réponds-moi ! Tu es réveillée ?`);
}

function dismissAlert() {
  document.getElementById('alertOverlay').classList.remove('active');
}

// ═══════════════════════════════════════════════════
// CONVERSATION
// ═══════════════════════════════════════════════════
async function greetUser() {
  const greeting = await callGroq(`Tu t'appelles Somnopilote. Tu es le compagnon de route de ${state.userName} qui souffre d'hypersomnie. 
  Tu vas l'accompagner sur la route pour la maintenir éveillée. Génère un message de bienvenue court et chaleureux (2-3 phrases max), 
  en la tutoyant, en français. Mentionne que tu vas l'interpeller régulièrement. Sois direct et rassurant.`, []);

  addMessage('vigil', greeting);
  speak(greeting, () => {
    scheduleNextInterpellation();
  });
}

async function interpellate() {
  setStatus('alert', 'INTERPELLATION');
  state.awaitingResponse = true;

  const systemPrompt = buildSystemPrompt();
  const usedList = state.usedTopics.slice(-20).join(', ');

  const prompt = `Tu dois interpeller ${state.userName} pour la maintenir éveillée.
  
Sujets déjà traités (ne PAS répéter ces thèmes): ${usedList || 'aucun pour l\'instant'}
  
Génère UNE interpellation en français qui:
- Commence par son prénom "${state.userName}" pour la réveiller
- Lance soit: une question de débat, un fait insolite surprenant, une devinette, une question philosophique, un quiz, une anecdote fascinante
- Style: ${state.convoStyleLabel()}
- Sois naturel, conversationnel, engageant
- 2-3 phrases max
- À la fin, pose UNE question précise à laquelle elle doit répondre oralement`;

  const message = await callGroq(prompt, state.conversationHistory);
  const topic = await extractTopic(message);
  state.usedTopics.push(topic);

  addMessage('vigil', message);
  speak(message, () => {
    startNoResponseTimer();
    setTimeout(() => startListening(), 500);
  });

  scheduleNextInterpellation();
}

function askNow() {
  clearAllTimers();
  interpellate();
}

async function handleUserSpeech(transcript) {
  clearNoResponseTimer();
  addMessage('user', transcript);
  setStatus('processing', 'TRAITEMENT');
  state.isProcessing = true;

  document.getElementById('listenBtn').classList.add('processing');
  document.getElementById('listenStatus').textContent = 'Somnopilote réfléchit…';

  const thinkingEl = addThinking();

  state.conversationHistory.push({ role: 'user', content: transcript });

  const systemPrompt = buildSystemPrompt();
  const response = await callGroq(
    `${state.userName} vient de répondre: "${transcript}". 
    Réponds de manière naturelle et engageante en 2-3 phrases. 
    Rebondis sur sa réponse. Tu peux continuer le débat ou conclure et annoncer que tu reviendras bientôt.
    Si tu conclus, dis-lui que tu la reprendras dans quelques minutes.`,
    state.conversationHistory
  );

  thinkingEl.remove();
  state.conversationHistory.push({ role: 'assistant', content: response });

  // Keep history manageable
  if (state.conversationHistory.length > 20) {
    state.conversationHistory = state.conversationHistory.slice(-16);
  }

  state.isProcessing = false;
  document.getElementById('listenBtn').classList.remove('processing');
  document.getElementById('listenStatus').textContent = 'Appuyer pour répondre';

  addMessage('vigil', response);
  speak(response, () => {
    setStatus('waiting', 'EN ROUTE');
  });
}

// ═══════════════════════════════════════════════════
// GROQ API
// ═══════════════════════════════════════════════════
async function callGroq(userMessage, history = []) {
  const messages = [
    ...history,
    { role: 'user', content: userMessage }
  ];

  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${state.apiKey}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [
          {
            role: 'system',
            content: buildSystemPrompt()
          },
          ...messages
        ],
        max_tokens: 200,
        temperature: 0.9,
      })
    });

    if (!res.ok) {
      const err = await res.json();
      console.error('Groq error:', err);
      return 'Désolé, j\'ai eu un problème de connexion. Je réessaie bientôt.';
    }

    const data = await res.json();
    return data.choices[0].message.content.trim();
  } catch (e) {
    console.error(e);
    return 'Connexion perdue momentanément. Je suis toujours là !';
  }
}

async function extractTopic(message) {
  // Simple keyword extraction without extra API call
  const keywords = message.match(/\b[A-ZÀ-Ü][a-zà-ü]{4,}\b/g) || [];
  return keywords.slice(0, 3).join(', ') || message.substring(0, 40);
}

function buildSystemPrompt() {
  return `Tu es Somnopilote, un compagnon de route bienveillant et stimulant pour ${state.userName}, qui souffre d'hypersomnie au volant.
Ton rôle est de la maintenir éveillée et alerte en engageant des conversations stimulantes.
Tu parles TOUJOURS en français, tu la tutoies, tu es chaleureux mais direct.
Tes réponses sont courtes (2-3 phrases max) car elle conduit.
Tu varies les sujets: philosophie, science, culture, devinettes, débats, faits insolites, histoire, psychologie, nature...
Tu ne parles JAMAIS des mêmes sujets deux fois.
Tu es son copilote de confiance.`;
}

function convoStyleLabel() {
  const labels = {
    varied: 'très varié, surprenant',
    quiz: 'quiz et devinettes interactifs',
    philo: 'questions philosophiques profondes',
    culture: 'culture générale et anecdotes',
    science: 'science, technologie et découvertes'
  };
  return labels[state.convoStyle] || 'varié';
}

// ═══════════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════════
function addMessage(role, text) {
  const scroll = document.getElementById('convoScroll');
  const div = document.createElement('div');
  div.className = `bubble ${role}`;

  if (role === 'vigil') {
    div.innerHTML = `<div class="bubble-name">Somnopilote</div>${text}`;
  } else {
    div.innerHTML = `<strong>Toi:</strong> ${text}`;
  }

  scroll.appendChild(div);
  scroll.scrollTop = scroll.scrollHeight;
  return div;
}

function addThinking() {
  const scroll = document.getElementById('convoScroll');
  const div = document.createElement('div');
  div.className = 'thinking';
  div.innerHTML = `<div class="thinking-dot"></div><div class="thinking-dot"></div><div class="thinking-dot"></div>`;
  scroll.appendChild(div);
  scroll.scrollTop = scroll.scrollHeight;
  return div;
}

function setStatus(type, text) {
  const dot = document.getElementById('statusDot');
  document.getElementById('statusText').textContent = text;
  dot.className = 'dot';
  if (type === 'alert') dot.classList.add('alert');
  else if (type === 'waiting' || type === 'speaking') dot.classList.add('waiting');
}
